<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">inorder_apply(PrintFunctor)</text>
  <text x="430" y="48" text-anchor="middle" font-size="13" fill="#888">Stateless functor &#x2014; prints each value, same result as inorder()</text>

  <!-- ===== CODE: usage + functor (left) ===== -->
  <rect x="30" y="66" width="380" height="110" rx="8" fill="#1e1e1e"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="11">
    <tspan x="50" y="86" fill="#6a9955">// usage:</tspan>
    <tspan x="50" y="104" fill="#4ec9b0">PrintFunctor</tspan><tspan fill="#9cdcfe"> pf</tspan><tspan fill="#d4d4d4">;</tspan>
    <tspan x="50" y="122" fill="#9cdcfe">tree</tspan><tspan fill="#d4d4d4">.</tspan><tspan fill="#dcdcaa">inorder_apply</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">pf</tspan><tspan fill="#d4d4d4">);</tspan><tspan fill="#6a9955">  // prints sorted</tspan>
    <tspan x="50" y="148" fill="#6a9955">// PrintFunctor::operator():</tspan>
    <tspan x="50" y="166" fill="#9cdcfe">std::cout</tspan><tspan fill="#d4d4d4"> &lt;&lt; value &lt;&lt; </tspan><tspan fill="#ce9178">" "</tspan><tspan fill="#d4d4d4">;</tspan><tspan fill="#6a9955">  // no state</tspan>
  </text>

  <!-- ===== TREE (right): 50,30,70,20,40 ===== -->
  <text x="590" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#888">Tree:</text>
  <line x1="590" y1="112" x2="530" y2="138" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="590" y1="112" x2="650" y2="138" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="530" y1="174" x2="500" y2="194" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="530" y1="174" x2="560" y2="194" stroke="#bdc3c7" stroke-width="1.5"/>
  <circle cx="590" cy="96" r="16" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="590" y="101" text-anchor="middle" font-size="11" font-weight="bold" fill="white">50</text>
  <circle cx="530" cy="156" r="16" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="530" y="161" text-anchor="middle" font-size="11" font-weight="bold" fill="white">30</text>
  <circle cx="650" cy="156" r="16" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="650" y="161" text-anchor="middle" font-size="11" font-weight="bold" fill="white">70</text>
  <circle cx="500" cy="210" r="16" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="500" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="white">20</text>
  <circle cx="560" cy="210" r="16" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="560" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="white">40</text>

  <!-- ===== TRACE: func() called at each node in order ===== -->
  <text x="430" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">In-Order: func() Called at Each Node</text>

  <rect x="60" y="264" width="110" height="44" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1.5"/>
  <text x="115" y="282" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#555">pf(20)</text>
  <text x="115" y="300" text-anchor="middle" font-size="11" fill="#3498db">prints: <tspan font-weight="bold">20</tspan></text>

  <text x="180" y="290" font-size="14" fill="#bdc3c7">&#x2192;</text>

  <rect x="194" y="264" width="110" height="44" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1.5"/>
  <text x="249" y="282" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#555">pf(30)</text>
  <text x="249" y="300" text-anchor="middle" font-size="11" fill="#3498db">prints: <tspan font-weight="bold">30</tspan></text>

  <text x="314" y="290" font-size="14" fill="#bdc3c7">&#x2192;</text>

  <rect x="328" y="264" width="110" height="44" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1.5"/>
  <text x="383" y="282" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#555">pf(40)</text>
  <text x="383" y="300" text-anchor="middle" font-size="11" fill="#3498db">prints: <tspan font-weight="bold">40</tspan></text>

  <text x="448" y="290" font-size="14" fill="#bdc3c7">&#x2192;</text>

  <rect x="462" y="264" width="110" height="44" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1.5"/>
  <text x="517" y="282" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#555">pf(50)</text>
  <text x="517" y="300" text-anchor="middle" font-size="11" fill="#3498db">prints: <tspan font-weight="bold">50</tspan></text>

  <text x="582" y="290" font-size="14" fill="#bdc3c7">&#x2192;</text>

  <rect x="596" y="264" width="110" height="44" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1.5"/>
  <text x="651" y="282" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#555">pf(70)</text>
  <text x="651" y="300" text-anchor="middle" font-size="11" fill="#3498db">prints: <tspan font-weight="bold">70</tspan></text>

  <!-- Screen output -->
  <text x="430" y="340" text-anchor="middle" font-size="13" fill="#555">Screen: <tspan font-weight="bold" fill="#3498db" font-family="Consolas, 'Courier New', monospace">20 30 40 50 70</tspan></text>
  <text x="430" y="358" text-anchor="middle" font-size="12" fill="#888">No state &#x2014; each call prints independently. Nothing to read back after.</text>

  <!-- Footer -->
  <rect x="30" y="380" width="800" height="66" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="404" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Same Output as inorder() &#x2014; So Why Use a Functor?</text>
  <text x="80" y="428" font-size="12" fill="#555">
    PrintFunctor proves the pattern works. The real power is SumFunctor and CountFunctor &#x2014;
    same traversal code, different behavior.
  </text>
</svg>