<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 680" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">search_() &#x2014; Recursion Trace</text>
  <text x="430" y="48" text-anchor="middle" font-size="13" fill="#888">Two examples: searching for a value that exists (40) and one that doesn&#x2019;t (45)</text>

  <!-- ===== CODE BLOCK (top) ===== -->
  <rect x="30" y="64" width="460" height="130" rx="8" fill="#1e1e1e"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="11">
    <tspan x="50" y="84" fill="#569cd6">bool</tspan><tspan fill="#dcdcaa"> search_</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#4ec9b0">Node</tspan><tspan fill="#d4d4d4">* </tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">, </tspan><tspan fill="#569cd6">int</tspan><tspan fill="#9cdcfe"> value</tspan><tspan fill="#d4d4d4">) </tspan><tspan fill="#569cd6">const</tspan><tspan fill="#d4d4d4"> {</tspan>
    <tspan x="70" y="104" fill="#c586c0">if</tspan><tspan fill="#d4d4d4"> (!</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#b5cea8"> false</tspan><tspan fill="#d4d4d4">;</tspan><tspan fill="#6a9955">          // not found</tspan>
    <tspan x="70" y="124" fill="#c586c0">if</tspan><tspan fill="#d4d4d4"> (</tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4"> == </tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">data</tspan><tspan fill="#d4d4d4">) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#b5cea8"> true</tspan><tspan fill="#d4d4d4">;</tspan><tspan fill="#6a9955">  // found it!</tspan>
    <tspan x="70" y="144" fill="#c586c0">if</tspan><tspan fill="#d4d4d4"> (</tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4"> &lt; </tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">data</tspan><tspan fill="#d4d4d4">)</tspan>
    <tspan x="90" y="160" fill="#c586c0">return</tspan><tspan fill="#dcdcaa"> search_</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">left</tspan><tspan fill="#d4d4d4">, </tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4">);</tspan><tspan fill="#6a9955">   // go left</tspan>
    <tspan x="70" y="180" fill="#c586c0">else</tspan>
    <tspan x="90" y="188" fill="#c586c0">return</tspan><tspan fill="#dcdcaa"> search_</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">right</tspan><tspan fill="#d4d4d4">, </tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4">);</tspan><tspan fill="#6a9955">  // go right</tspan>
  </text>

  <!-- ===== TREE (right side) ===== -->
  <text x="660" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#888">Tree:</text>
  <line x1="660" y1="114" x2="610" y2="142" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="660" y1="114" x2="710" y2="142" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="610" y1="178" x2="585" y2="198" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="610" y1="178" x2="635" y2="198" stroke="#bdc3c7" stroke-width="1.5"/>
  <circle cx="660" cy="98" r="16" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="660" y="103" text-anchor="middle" font-size="11" font-weight="bold" fill="white">50</text>
  <circle cx="610" cy="160" r="16" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="610" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="white">30</text>
  <circle cx="710" cy="160" r="16" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="710" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="white">70</text>
  <circle cx="585" cy="214" r="16" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="585" y="219" text-anchor="middle" font-size="11" font-weight="bold" fill="white">20</text>
  <circle cx="635" cy="214" r="16" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="635" y="219" text-anchor="middle" font-size="11" font-weight="bold" fill="white">40</text>

  <!-- ===== LEFT TRACE: search(40) — FOUND ===== -->
  <rect x="30" y="250" width="390" height="26" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="225" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">search(40) &#x2014; Found!</text>

  <!-- Step 1 -->
  <rect x="30" y="282" width="390" height="28" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
  <text x="44" y="301" font-size="11" font-weight="bold" fill="#3498db">&#x2460;</text>
  <text x="62" y="301" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">search_(<tspan fill="#3498db" font-weight="bold">50</tspan>, 40)</text>
  <text x="230" y="301" font-size="11" fill="#888">40 &lt; 50 &#x2192; search_(left, 40)</text>

  <!-- Step 2 -->
  <rect x="50" y="314" width="370" height="28" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
  <text x="64" y="333" font-size="11" font-weight="bold" fill="#3498db">&#x2461;</text>
  <text x="86" y="333" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">search_(<tspan fill="#3498db" font-weight="bold">30</tspan>, 40)</text>
  <text x="250" y="333" font-size="11" fill="#888">40 &gt; 30 &#x2192; search_(right, 40)</text>

  <!-- Step 3: FOUND -->
  <rect x="70" y="346" width="350" height="28" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="84" y="365" font-size="11" font-weight="bold" fill="#27ae60">&#x2462;</text>
  <text x="106" y="365" font-size="11" font-family="Consolas, 'Courier New', monospace" font-weight="bold" fill="#27ae60">search_(40, 40) &#x2192; return true</text>
  <text x="330" y="365" font-size="11" fill="#27ae60">40 == 40 &#x2713;</text>

  <!-- Unwind -->
  <text x="225" y="394" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">&#x2193; true bubbles back up &#x2193;</text>

  <rect x="50" y="406" width="370" height="24" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="64" y="423" font-size="11" font-weight="bold" fill="#e67e22">&#x2463;</text>
  <text x="86" y="423" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">back to 30: return <tspan fill="#27ae60" font-weight="bold">true</tspan></text>

  <rect x="30" y="434" width="390" height="24" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="44" y="451" font-size="11" font-weight="bold" fill="#e67e22">&#x2464;</text>
  <text x="62" y="451" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">back to 50: return <tspan fill="#27ae60" font-weight="bold">true</tspan> &#x2192; caller gets true</text>

  <!-- ===== RIGHT TRACE: search(45) — NOT FOUND ===== -->
  <rect x="440" y="250" width="390" height="26" rx="4" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="635" y="268" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">search(45) &#x2014; Not Found</text>

  <!-- Step 1 -->
  <rect x="440" y="282" width="390" height="28" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
  <text x="454" y="301" font-size="11" font-weight="bold" fill="#3498db">&#x2460;</text>
  <text x="472" y="301" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">search_(<tspan fill="#3498db" font-weight="bold">50</tspan>, 45)</text>
  <text x="640" y="301" font-size="11" fill="#888">45 &lt; 50 &#x2192; search_(left, 45)</text>

  <!-- Step 2 -->
  <rect x="460" y="314" width="370" height="28" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
  <text x="474" y="333" font-size="11" font-weight="bold" fill="#3498db">&#x2461;</text>
  <text x="496" y="333" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">search_(<tspan fill="#3498db" font-weight="bold">30</tspan>, 45)</text>
  <text x="660" y="333" font-size="11" fill="#888">45 &gt; 30 &#x2192; search_(right, 45)</text>

  <!-- Step 3 -->
  <rect x="480" y="346" width="350" height="28" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
  <text x="494" y="365" font-size="11" font-weight="bold" fill="#3498db">&#x2462;</text>
  <text x="516" y="365" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">search_(<tspan fill="#3498db" font-weight="bold">40</tspan>, 45)</text>
  <text x="680" y="365" font-size="11" fill="#888">45 &gt; 40 &#x2192; search_(right, 45)</text>

  <!-- Step 4: nullptr — NOT FOUND -->
  <rect x="500" y="378" width="330" height="28" rx="4" fill="#fdedec" stroke="#e74c3c" stroke-width="2"/>
  <text x="514" y="397" font-size="11" font-weight="bold" fill="#e74c3c">&#x2463;</text>
  <text x="536" y="397" font-size="11" font-family="Consolas, 'Courier New', monospace" font-weight="bold" fill="#e74c3c">search_(nullptr, 45) &#x2192; return false</text>

  <!-- Unwind -->
  <text x="635" y="426" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">&#x2193; false bubbles back up &#x2193;</text>

  <rect x="480" y="438" width="350" height="24" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="494" y="455" font-size="11" font-weight="bold" fill="#e67e22">&#x2464;</text>
  <text x="516" y="455" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">back to 40: return <tspan fill="#e74c3c" font-weight="bold">false</tspan></text>

  <rect x="460" y="466" width="370" height="24" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="474" y="483" font-size="11" font-weight="bold" fill="#e67e22">&#x2465;</text>
  <text x="496" y="483" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">back to 30: return <tspan fill="#e74c3c" font-weight="bold">false</tspan></text>

  <rect x="440" y="494" width="390" height="24" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="454" y="511" font-size="11" font-weight="bold" fill="#e67e22">&#x2466;</text>
  <text x="472" y="511" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">back to 50: return <tspan fill="#e74c3c" font-weight="bold">false</tspan> &#x2192; caller gets false</text>

  <!-- ===== Footer ===== -->
  <rect x="30" y="536" width="800" height="130" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="560" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Key Differences from insert_()</text>

  <text x="80" y="584" font-size="12" fill="#555">
    <tspan font-weight="bold" fill="#3498db">No reattachment needed.</tspan>
    search_() returns true/false &#x2014; it doesn&#x2019;t modify any pointers.
  </text>
  <text x="80" y="608" font-size="12" fill="#555">
    <tspan font-weight="bold" fill="#3498db">The return value bubbles up.</tspan>
    Each level passes the result straight through, unchanged.
  </text>
  <text x="80" y="632" font-size="12" fill="#555">
    <tspan font-weight="bold" fill="#3498db">One extra step for not-found.</tspan>
    search(45) goes deeper than search(40) &#x2014; it must hit nullptr to confirm.
  </text>
  <text x="80" y="656" font-size="12" fill="#555">
    <tspan font-weight="bold" fill="#3498db">Same comparison count.</tspan>
    Both are O(height). Balanced: O(log n). Degenerate: O(n).
  </text>
</svg>