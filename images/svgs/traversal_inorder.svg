<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 530" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">In-Order Traversal</text>
  <text x="430" y="48" text-anchor="middle" font-size="13" fill="#888">Left &#x2192; <tspan font-weight="bold">Root</tspan> &#x2192; Right &#x2014; visits the current node <tspan font-weight="bold">in the middle</tspan></text>

  <!-- ===== 4-LEVEL TREE =====
              50
            /    \
          30      70
         / \     / \
        20  40  60  80
       /  \   \    /
      10  25  45  75

       In-order: 10(1) 20(2) 25(3) 30(4) 40(5) 45(6) 50(7) 60(8) 70(9) 75(10) 80(11)

       L0 y=100: 300
       L1 y=175: 170, 430
       L2 y=250: 105, 235, 365, 495
       L3 y=325: 72, 138, 268, 462
  -->

  <!-- Lines -->
  <line x1="300" y1="124" x2="170" y2="151" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="300" y1="124" x2="430" y2="151" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="170" y1="199" x2="105" y2="226" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="170" y1="199" x2="235" y2="226" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="430" y1="199" x2="365" y2="226" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="430" y1="199" x2="495" y2="226" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="105" y1="274" x2="72" y2="301" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="105" y1="274" x2="138" y2="301" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="235" y1="274" x2="268" y2="301" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="495" y1="274" x2="462" y2="301" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- L0: 50 -->
  <circle cx="300" cy="100" r="22" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="300" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="white">50</text>
  <!-- L1: 30, 70 -->
  <circle cx="170" cy="175" r="22" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="170" y="181" text-anchor="middle" font-size="14" font-weight="bold" fill="white">30</text>
  <circle cx="430" cy="175" r="22" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="430" y="181" text-anchor="middle" font-size="14" font-weight="bold" fill="white">70</text>
  <!-- L2: 20, 40, 60, 80 -->
  <circle cx="105" cy="250" r="22" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="105" y="256" text-anchor="middle" font-size="14" font-weight="bold" fill="white">20</text>
  <circle cx="235" cy="250" r="22" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="235" y="256" text-anchor="middle" font-size="14" font-weight="bold" fill="white">40</text>
  <circle cx="365" cy="250" r="22" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="365" y="256" text-anchor="middle" font-size="14" font-weight="bold" fill="white">60</text>
  <circle cx="495" cy="250" r="22" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="495" y="256" text-anchor="middle" font-size="14" font-weight="bold" fill="white">80</text>
  <!-- L3: 10, 25, 45, 75 -->
  <circle cx="72" cy="325" r="22" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="72" y="331" text-anchor="middle" font-size="14" font-weight="bold" fill="white">10</text>
  <circle cx="138" cy="325" r="22" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="138" y="331" text-anchor="middle" font-size="14" font-weight="bold" fill="white">25</text>
  <circle cx="268" cy="325" r="22" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="268" y="331" text-anchor="middle" font-size="14" font-weight="bold" fill="white">45</text>
  <circle cx="462" cy="325" r="22" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="462" y="331" text-anchor="middle" font-size="14" font-weight="bold" fill="white">75</text>

  <!-- Visit order badges -->
  <circle cx="328" cy="86" r="11" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text x="328" y="90" text-anchor="middle" font-size="9" font-weight="bold" fill="white">7</text>

  <circle cx="198" cy="161" r="11" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text x="198" y="165" text-anchor="middle" font-size="9" font-weight="bold" fill="white">4</text>
  <circle cx="458" cy="161" r="11" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text x="458" y="165" text-anchor="middle" font-size="9" font-weight="bold" fill="white">9</text>

  <circle cx="133" cy="236" r="11" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text x="133" y="240" text-anchor="middle" font-size="9" font-weight="bold" fill="white">2</text>
  <circle cx="263" cy="236" r="11" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text x="263" y="240" text-anchor="middle" font-size="9" font-weight="bold" fill="white">5</text>
  <circle cx="393" cy="236" r="11" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text x="393" y="240" text-anchor="middle" font-size="9" font-weight="bold" fill="white">8</text>
  <circle cx="523" cy="236" r="11" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text x="523" y="240" text-anchor="middle" font-size="9" font-weight="bold" fill="white">11</text>

  <circle cx="100" cy="311" r="11" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text x="100" y="315" text-anchor="middle" font-size="9" font-weight="bold" fill="white">1</text>
  <circle cx="166" cy="311" r="11" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text x="166" y="315" text-anchor="middle" font-size="9" font-weight="bold" fill="white">3</text>
  <circle cx="296" cy="311" r="11" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text x="296" y="315" text-anchor="middle" font-size="9" font-weight="bold" fill="white">6</text>
  <circle cx="490" cy="311" r="11" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text x="490" y="315" text-anchor="middle" font-size="9" font-weight="bold" fill="white">10</text>

  <!-- ===== Output sequence ===== -->
  <text x="600" y="100" font-size="13" font-weight="bold" fill="#2c3e50">Output:</text>

  <rect x="600" y="112" width="32" height="24" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text x="616" y="129" text-anchor="middle" font-size="11" font-weight="bold" fill="white">10</text>
  <rect x="638" y="112" width="32" height="24" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text x="654" y="129" text-anchor="middle" font-size="11" font-weight="bold" fill="white">20</text>
  <rect x="676" y="112" width="32" height="24" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text x="692" y="129" text-anchor="middle" font-size="11" font-weight="bold" fill="white">25</text>
  <rect x="714" y="112" width="32" height="24" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text x="730" y="129" text-anchor="middle" font-size="11" font-weight="bold" fill="white">30</text>
  <rect x="752" y="112" width="32" height="24" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text x="768" y="129" text-anchor="middle" font-size="11" font-weight="bold" fill="white">40</text>
  <rect x="790" y="112" width="32" height="24" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text x="806" y="129" text-anchor="middle" font-size="11" font-weight="bold" fill="white">45</text>

  <rect x="600" y="142" width="32" height="24" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text x="616" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="white">50</text>
  <rect x="638" y="142" width="32" height="24" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text x="654" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="white">60</text>
  <rect x="676" y="142" width="32" height="24" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text x="692" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="white">70</text>
  <rect x="714" y="142" width="32" height="24" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text x="730" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="white">75</text>
  <rect x="752" y="142" width="32" height="24" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text x="768" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="white">80</text>

  <text x="600" y="186" font-size="12" font-weight="bold" fill="#27ae60">&#x2713; Sorted!</text>

  <!-- ===== Recursive trace ===== -->
  <text x="600" y="220" font-size="11" font-weight="bold" fill="#888">Recursive pattern:</text>
  <text x="600" y="240" font-size="11" fill="#555" font-family="Consolas, 'Courier New', monospace">inorder_(node):</text>
  <text x="612" y="258" font-size="11" fill="#555" font-family="Consolas, 'Courier New', monospace">inorder_(left)</text>
  <text x="612" y="276" font-size="11" fill="#27ae60" font-weight="bold" font-family="Consolas, 'Courier New', monospace">print node  &#x2190; middle</text>
  <text x="612" y="294" font-size="11" fill="#555" font-family="Consolas, 'Courier New', monospace">inorder_(right)</text>

  <!-- Key -->
  <circle cx="612" cy="326" r="9" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text x="628" y="330" font-size="10" fill="#555">Node value</text>
  <circle cx="612" cy="348" r="9" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text x="628" y="352" font-size="10" fill="#555">Visit order</text>

  <!-- ===== Footer ===== -->
  <rect x="30" y="374" width="800" height="140" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>

  <text x="430" y="400" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">Key Property: In-Order on a BST Always Produces Sorted Output</text>

  <text x="80" y="426" font-size="12" fill="#555">
    By the BST property, all left values &lt; current &lt; all right values.
  </text>
  <text x="80" y="448" font-size="12" fill="#555">
    Visiting left first, then current, then right gives <tspan font-weight="bold">ascending order</tspan>.
  </text>
  <text x="80" y="470" font-size="12" fill="#555">
    Notice: the visit numbers read left-to-right across the tree &#x2014; smallest node visited first, largest last.
  </text>
  <text x="80" y="498" font-size="12" fill="#555">
    <tspan font-weight="bold">Use cases:</tspan> print sorted data, verify BST correctness, range queries.
  </text>
</svg>