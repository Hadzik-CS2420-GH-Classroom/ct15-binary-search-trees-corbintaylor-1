<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">inorder_apply() &#x2014; Functor-Based Traversal</text>
  <text x="450" y="52" text-anchor="middle" fill="#777" font-size="13">Same traversal logic, different action at each node &#x2014; the functor decides what happens</text>

  <!-- Code block -->
  <rect x="30" y="70" width="420" height="130" rx="8" fill="#1e1e1e"/>
  <text x="50" y="95" fill="#569cd6" font-size="12" font-family="Consolas, monospace">template &lt;<tspan fill="#569cd6">typename</tspan> <tspan fill="#4ec9b0">Functor</tspan>&gt;</text>
  <text x="50" y="115" fill="#569cd6" font-size="12" font-family="Consolas, monospace">void <tspan fill="#dcdcaa">inorder_apply_</tspan>(<tspan fill="#4ec9b0">Node</tspan>* <tspan fill="#9cdcfe">node</tspan>, <tspan fill="#4ec9b0">Functor</tspan>&amp; <tspan fill="#9cdcfe">func</tspan>) {</text>
  <text x="70" y="135" fill="#569cd6" font-size="12" font-family="Consolas, monospace">if <tspan fill="#d4d4d4">(!</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">)</tspan> return;</text>
  <text x="70" y="155" fill="#dcdcaa" font-size="12" font-family="Consolas, monospace">inorder_apply_<tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">node</tspan>-><tspan fill="#9cdcfe">left</tspan>, <tspan fill="#9cdcfe">func</tspan><tspan fill="#d4d4d4">);</tspan>  <tspan fill="#6a9955">// 1. left</tspan></text>
  <text x="70" y="175" fill="#9cdcfe" font-size="12" font-family="Consolas, monospace">func<tspan fill="#d4d4d4">(</tspan>node->data<tspan fill="#d4d4d4">);</tspan>              <tspan fill="#6a9955">// 2. ACTION</tspan></text>
  <text x="70" y="195" fill="#dcdcaa" font-size="12" font-family="Consolas, monospace">inorder_apply_<tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">node</tspan>-><tspan fill="#9cdcfe">right</tspan>, <tspan fill="#9cdcfe">func</tspan><tspan fill="#d4d4d4">);</tspan> <tspan fill="#6a9955">// 3. right</tspan></text>
  <text x="50" y="195" fill="#569cd6" font-size="12" font-family="Consolas, monospace">}</text>

  <!-- Tree showing visit order with func() calls -->
  <text x="680" y="90" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">In-Order Visit: func() Called</text>

  <!-- Small tree: 30, 20, 40 -->
  <circle cx="680" cy="130" r="22" fill="#fff" stroke="#8e44ad" stroke-width="2"/>
  <text x="680" y="135" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">30</text>
  <line x1="662" y1="148" x2="620" y2="180" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="698" y1="148" x2="740" y2="180" stroke="#bdc3c7" stroke-width="2"/>

  <circle cx="620" cy="200" r="22" fill="#fff" stroke="#8e44ad" stroke-width="2"/>
  <text x="620" y="205" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">20</text>

  <circle cx="740" cy="200" r="22" fill="#fff" stroke="#8e44ad" stroke-width="2"/>
  <text x="740" y="205" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">40</text>

  <!-- Visit order badges + func() labels -->
  <text x="620" y="238" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">&#x2460; func(20)</text>
  <text x="680" y="168" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">&#x2461; func(30)</text>
  <text x="740" y="238" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="bold">&#x2462; func(40)</text>

  <!-- Three functor examples side by side -->
  <text x="450" y="270" text-anchor="middle" fill="#2c3e50" font-size="16" font-weight="bold">Same Traversal, Three Different Functors</text>

  <!-- PrintFunctor -->
  <rect x="30" y="290" width="270" height="160" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="165" y="314" text-anchor="middle" fill="#1a5276" font-size="13" font-weight="bold">PrintFunctor (stateless)</text>
  <rect x="50" y="326" width="230" height="56" rx="6" fill="#1e1e1e"/>
  <text x="65" y="346" fill="#569cd6" font-size="11" font-family="Consolas, monospace">void <tspan fill="#dcdcaa">operator()</tspan>(<tspan fill="#569cd6">int</tspan> <tspan fill="#9cdcfe">val</tspan>) {</text>
  <text x="80" y="366" fill="#9cdcfe" font-size="11" font-family="Consolas, monospace">cout &lt;&lt; <tspan fill="#9cdcfe">val</tspan> &lt;&lt; <tspan fill="#ce9178">" "</tspan>;</text>
  <text x="65" y="376" fill="#569cd6" font-size="11" font-family="Consolas, monospace">}</text>
  <text x="165" y="406" text-anchor="middle" fill="#2980b9" font-size="12" font-weight="bold">Output: 20 30 40</text>
  <text x="165" y="424" text-anchor="middle" fill="#888" font-size="11">No state &#x2014; each call independent</text>
  <text x="165" y="440" text-anchor="middle" fill="#888" font-size="11">Same result as inorder()</text>

  <!-- SumFunctor -->
  <rect x="315" y="290" width="270" height="160" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="450" y="314" text-anchor="middle" fill="#7d6608" font-size="13" font-weight="bold">SumFunctor (stateful)</text>
  <rect x="335" y="326" width="230" height="56" rx="6" fill="#1e1e1e"/>
  <text x="350" y="346" fill="#569cd6" font-size="11" font-family="Consolas, monospace">void <tspan fill="#dcdcaa">operator()</tspan>(<tspan fill="#569cd6">int</tspan> <tspan fill="#9cdcfe">val</tspan>) {</text>
  <text x="365" y="366" fill="#9cdcfe" font-size="11" font-family="Consolas, monospace">total += <tspan fill="#9cdcfe">val</tspan>;</text>
  <text x="350" y="376" fill="#569cd6" font-size="11" font-family="Consolas, monospace">}</text>
  <text x="450" y="406" text-anchor="middle" fill="#f39c12" font-size="12" font-weight="bold">total: 0 &#x2192; 20 &#x2192; 50 &#x2192; 90</text>
  <text x="450" y="424" text-anchor="middle" fill="#888" font-size="11">State accumulates across calls</text>
  <text x="450" y="440" text-anchor="middle" fill="#888" font-size="11">Passed by reference &#x2014; same object</text>

  <!-- CountFunctor -->
  <rect x="600" y="290" width="270" height="160" rx="10" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="735" y="314" text-anchor="middle" fill="#4a235a" font-size="13" font-weight="bold">CountFunctor (stateful)</text>
  <rect x="620" y="326" width="230" height="56" rx="6" fill="#1e1e1e"/>
  <text x="635" y="346" fill="#569cd6" font-size="11" font-family="Consolas, monospace">void <tspan fill="#dcdcaa">operator()</tspan>(<tspan fill="#569cd6">int</tspan> <tspan fill="#9cdcfe">val</tspan>) {</text>
  <text x="650" y="366" fill="#9cdcfe" font-size="11" font-family="Consolas, monospace">count++;</text>
  <text x="635" y="376" fill="#569cd6" font-size="11" font-family="Consolas, monospace">}</text>
  <text x="735" y="406" text-anchor="middle" fill="#8e44ad" font-size="12" font-weight="bold">count: 0 &#x2192; 1 &#x2192; 2 &#x2192; 3</text>
  <text x="735" y="424" text-anchor="middle" fill="#888" font-size="11">Ignores the value entirely</text>
  <text x="735" y="440" text-anchor="middle" fill="#888" font-size="11">Just counts visits</text>

  <!-- Bottom callout -->
  <rect x="30" y="466" width="840" height="60" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="490" text-anchor="middle" fill="#1a5e32" font-size="13" font-weight="bold">The traversal code is written ONCE. The functor controls what happens at each node.</text>
  <text x="450" y="510" text-anchor="middle" fill="#555" font-size="12">This is the same idea behind C++ lambdas, <tspan font-family="Consolas, monospace">std::for_each</tspan>, and STL algorithm callbacks.</text>
</svg>
