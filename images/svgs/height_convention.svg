<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">Height Convention</text>
  <text x="430" y="46" text-anchor="middle" font-size="13" fill="#888">nullptr has height &#x2212;1, a leaf has height 0, height = edges on longest root-to-leaf path</text>

  <!-- ===== TREE with height annotations =====
       Tree:         50          h=2
                   /    \
                 30      70      h=1
                / \     / \
              20   40  60  80    h=0  (leaves)

       Center=340
       L0 y=100: 340
       L1 y=180: 240, 440
       L2 y=260: 190, 290, 390, 490
  -->

  <!-- Lines -->
  <line x1="340" y1="124" x2="240" y2="156" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="340" y1="124" x2="440" y2="156" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="240" y1="204" x2="190" y2="236" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="240" y1="204" x2="290" y2="236" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="440" y1="204" x2="390" y2="236" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="440" y1="204" x2="490" y2="236" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- Level 0: 50 -->
  <circle cx="340" cy="100" r="22" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="340" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="white">50</text>

  <!-- Level 1: 30, 70 -->
  <circle cx="240" cy="180" r="22" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="240" y="186" text-anchor="middle" font-size="14" font-weight="bold" fill="white">30</text>
  <circle cx="440" cy="180" r="22" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="440" y="186" text-anchor="middle" font-size="14" font-weight="bold" fill="white">70</text>

  <!-- Level 2: 20, 40, 60, 80 (leaves) -->
  <circle cx="190" cy="260" r="22" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="190" y="266" text-anchor="middle" font-size="14" font-weight="bold" fill="white">20</text>
  <circle cx="290" cy="260" r="22" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="290" y="266" text-anchor="middle" font-size="14" font-weight="bold" fill="white">40</text>
  <circle cx="390" cy="260" r="22" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="390" y="266" text-anchor="middle" font-size="14" font-weight="bold" fill="white">60</text>
  <circle cx="490" cy="260" r="22" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="490" y="266" text-anchor="middle" font-size="14" font-weight="bold" fill="white">80</text>

  <!-- nullptr children below leaves (just two examples) -->
  <line x1="190" y1="282" x2="166" y2="304" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="190" y1="282" x2="214" y2="304" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="166" y="318" text-anchor="middle" font-size="9" fill="#e74c3c" font-style="italic">null</text>
  <text x="214" y="318" text-anchor="middle" font-size="9" fill="#e74c3c" font-style="italic">null</text>

  <!-- Height labels (right side, with bracket lines) -->
  <!-- h=2 at root -->
  <rect x="570" y="88" width="70" height="26" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
  <text x="605" y="106" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498db">h = 2</text>
  <line x1="366" y1="100" x2="570" y2="100" stroke="#3498db" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- h=1 at level 1 -->
  <rect x="570" y="168" width="70" height="26" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
  <text x="605" y="186" text-anchor="middle" font-size="13" font-weight="bold" fill="#3498db">h = 1</text>
  <line x1="466" y1="180" x2="570" y2="180" stroke="#3498db" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- h=0 at leaves -->
  <rect x="570" y="248" width="70" height="26" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
  <text x="605" y="266" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">h = 0</text>
  <line x1="516" y1="260" x2="570" y2="260" stroke="#27ae60" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- h=-1 at nullptr -->
  <rect x="570" y="300" width="76" height="26" rx="4" fill="#fdf2e9" stroke="#e74c3c" stroke-width="1"/>
  <text x="608" y="318" text-anchor="middle" font-size="13" font-weight="bold" fill="#e74c3c">h = &#x2212;1</text>
  <line x1="228" y1="310" x2="570" y2="310" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== Calculation breakdown ===== -->
  <rect x="30" y="348" width="800" height="136" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>

  <text x="430" y="374" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">How height_() Computes: 1 + max(left, right)</text>

  <text x="80" y="400" font-size="12" fill="#555">
    <tspan font-weight="bold" fill="#e74c3c">Base case:</tspan> nullptr returns <tspan font-weight="bold">&#x2212;1</tspan>
  </text>
  <text x="80" y="422" font-size="12" fill="#555">
    <tspan font-weight="bold" fill="#27ae60">Leaf (20):</tspan> 1 + max(&#x2212;1, &#x2212;1) = 1 + (&#x2212;1) = <tspan font-weight="bold">0</tspan>  &#x2713;
  </text>
  <text x="80" y="444" font-size="12" fill="#555">
    <tspan font-weight="bold" fill="#3498db">Node 30:</tspan> 1 + max(0, 0) = <tspan font-weight="bold">1</tspan>  &#x2713;
  </text>
  <text x="80" y="466" font-size="12" fill="#555">
    <tspan font-weight="bold" fill="#3498db">Root 50:</tspan> 1 + max(1, 1) = <tspan font-weight="bold">2</tspan>  &#x2713;   &#x2014;  7 nodes, height = 2 &#x2248; log&#x2082;(7)
  </text>
</svg>