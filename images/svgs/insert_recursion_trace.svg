<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">insert_() &#x2014; Recursion Trace</text>
  <text x="430" y="48" text-anchor="middle" font-size="13" fill="#888">Following every recursive call when inserting 40 into the tree</text>

  <!-- ===== CODE BLOCK (left side) ===== -->
  <rect x="30" y="66" width="380" height="160" rx="8" fill="#1e1e1e"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="11">
    <tspan x="50" y="88" fill="#4ec9b0">Node</tspan><tspan fill="#d4d4d4">* </tspan><tspan fill="#dcdcaa">insert_</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#4ec9b0">Node</tspan><tspan fill="#d4d4d4">* </tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">, </tspan><tspan fill="#569cd6">int</tspan><tspan fill="#9cdcfe"> value</tspan><tspan fill="#d4d4d4">) {</tspan>
    <tspan x="70" y="110" fill="#c586c0">if</tspan><tspan fill="#d4d4d4"> (!</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">)</tspan>
    <tspan x="90" y="126" fill="#c586c0">return</tspan><tspan fill="#569cd6"> new</tspan><tspan fill="#4ec9b0"> Node</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4">);</tspan><tspan fill="#6a9955">  // base case: create leaf</tspan>
    <tspan x="70" y="148" fill="#c586c0">if</tspan><tspan fill="#d4d4d4"> (</tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4"> &lt; </tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">data</tspan><tspan fill="#d4d4d4">)</tspan>
    <tspan x="90" y="164" fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">left</tspan><tspan fill="#d4d4d4"> = </tspan><tspan fill="#dcdcaa">insert_</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">left</tspan><tspan fill="#d4d4d4">, </tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4">);</tspan><tspan fill="#6a9955"> // go left</tspan>
    <tspan x="70" y="182" fill="#c586c0">else if</tspan><tspan fill="#d4d4d4"> (</tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4"> > </tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">data</tspan><tspan fill="#d4d4d4">)</tspan>
    <tspan x="90" y="198" fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">right</tspan><tspan fill="#d4d4d4"> = </tspan><tspan fill="#dcdcaa">insert_</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">right</tspan><tspan fill="#d4d4d4">, </tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4">);</tspan><tspan fill="#6a9955"> // go right</tspan>
    <tspan x="70" y="216" fill="#c586c0">return</tspan><tspan fill="#9cdcfe"> node</tspan><tspan fill="#d4d4d4">;</tspan><tspan fill="#6a9955">                        // return unchanged node</tspan>
  </text>

  <!-- ===== TREE (right side, top) ===== -->
  <text x="600" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#888">Before inserting 40:</text>

  <line x1="600" y1="118" x2="540" y2="150" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="600" y1="118" x2="660" y2="150" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="540" y1="186" x2="510" y2="210" stroke="#bdc3c7" stroke-width="1.5"/>
  <circle cx="600" cy="102" r="18" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="600" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="white">50</text>
  <circle cx="540" cy="168" r="18" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="540" y="174" text-anchor="middle" font-size="12" font-weight="bold" fill="white">30</text>
  <circle cx="660" cy="168" r="18" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="660" y="174" text-anchor="middle" font-size="12" font-weight="bold" fill="white">70</text>
  <circle cx="510" cy="228" r="18" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="510" y="234" text-anchor="middle" font-size="12" font-weight="bold" fill="white">20</text>

  <!-- nullptr where 40 will go -->
  <line x1="556" y1="186" x2="576" y2="210" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="582" y="226" font-size="9" fill="#e67e22" font-style="italic">null &#x2190; 40 goes here</text>

  <!-- ===== TRACE (full width, below) ===== -->
  <text x="430" y="262" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Call Stack Trace: insert_(root_, 40)</text>

  <!-- Step 1: insert_(50, 40) -->
  <rect x="30" y="276" width="800" height="32" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
  <text x="44" y="297" font-size="11" font-weight="bold" fill="#3498db">&#x2460;</text>
  <text x="62" y="297" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">insert_(<tspan fill="#3498db" font-weight="bold">50</tspan>, 40)</text>
  <text x="400" y="297" font-size="11" fill="#888">40 &lt; 50 &#x2192; node->left = insert_(node->left, 40)</text>

  <!-- Step 2: insert_(30, 40) indented -->
  <rect x="50" y="312" width="780" height="32" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
  <text x="64" y="333" font-size="11" font-weight="bold" fill="#3498db">&#x2461;</text>
  <text x="86" y="333" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">insert_(<tspan fill="#3498db" font-weight="bold">30</tspan>, 40)</text>
  <text x="400" y="333" font-size="11" fill="#888">40 &gt; 30 &#x2192; node->right = insert_(node->right, 40)</text>

  <!-- Step 3: insert_(nullptr, 40) — BASE CASE -->
  <rect x="70" y="348" width="760" height="32" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="84" y="369" font-size="11" font-weight="bold" fill="#27ae60">&#x2462;</text>
  <text x="106" y="369" font-size="11" font-family="Consolas, 'Courier New', monospace" font-weight="bold" fill="#27ae60">insert_(nullptr, 40) &#x2192; return new Node(40)</text>
  <text x="500" y="369" font-size="11" fill="#27ae60">base case! creates the new leaf</text>

  <!-- UNWINDING -->
  <text x="430" y="404" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">&#x2193; Now the call stack unwinds &#x2014; each level reattaches its child &#x2193;</text>

  <!-- Step 4: returns to 30, reattaches -->
  <rect x="50" y="418" width="780" height="32" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="64" y="439" font-size="11" font-weight="bold" fill="#e67e22">&#x2463;</text>
  <text x="86" y="439" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">back to <tspan fill="#3498db" font-weight="bold">30</tspan>: node->right = <tspan fill="#27ae60" font-weight="bold">Node(40)</tspan></text>
  <text x="500" y="439" font-size="11" fill="#888">30&#x2019;s right pointer now points to the new node</text>

  <!-- Step 5: returns to 50, reattaches -->
  <rect x="30" y="454" width="800" height="32" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="44" y="475" font-size="11" font-weight="bold" fill="#e67e22">&#x2464;</text>
  <text x="62" y="475" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">back to <tspan fill="#3498db" font-weight="bold">50</tspan>: node->left = <tspan fill="#3498db">30</tspan> (unchanged)</text>
  <text x="500" y="475" font-size="11" fill="#888">50&#x2019;s left was already 30, returns 50 to caller</text>

  <!-- Footer -->
  <rect x="30" y="500" width="800" height="30" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="520" text-anchor="middle" font-size="12" fill="#555">
    The <tspan font-weight="bold" fill="#27ae60">new node is created at the bottom</tspan>, then each returning call <tspan font-weight="bold" fill="#e67e22">reattaches its child pointer</tspan> on the way back up.
  </text>
</svg>