<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 680" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">Three Traversal Orders &#x2014; Same Tree, Different Visit Sequences</text>
  <text x="430" y="48" text-anchor="middle" font-size="13" fill="#888">The only difference is WHEN we visit (print) the current node relative to its subtrees</text>

  <!-- ===== TREE (compact, centered at x=430) =====
       Tree:         50
                   /    \
                 30      70
                / \     / \
              20   40  60  80

       L0 y=94:  430
       L1 y=154: 330, 530
       L2 y=214: 280, 380, 480, 580
  -->

  <!-- Lines -->
  <line x1="430" y1="118" x2="330" y2="130" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="430" y1="118" x2="530" y2="130" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="330" y1="178" x2="280" y2="190" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="330" y1="178" x2="380" y2="190" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="530" y1="178" x2="480" y2="190" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="530" y1="178" x2="580" y2="190" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- Nodes -->
  <circle cx="430" cy="94" r="20" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="430" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="white">50</text>
  <circle cx="330" cy="154" r="20" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="330" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="white">30</text>
  <circle cx="530" cy="154" r="20" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="530" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="white">70</text>
  <circle cx="280" cy="214" r="20" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="280" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="white">20</text>
  <circle cx="380" cy="214" r="20" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="380" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="white">40</text>
  <circle cx="480" cy="214" r="20" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="480" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="white">60</text>
  <circle cx="580" cy="214" r="20" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="580" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="white">80</text>

  <!-- ===== 1. IN-ORDER: Left -> Root -> Right ===== -->
  <rect x="30" y="258" width="800" height="120" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>

  <text x="50" y="282" font-size="15" font-weight="bold" fill="#27ae60">In-Order</text>
  <text x="160" y="282" font-size="13" fill="#555">Left &#x2192; <tspan font-weight="bold">Root</tspan> &#x2192; Right</text>

  <!-- Visit sequence boxes -->
  <rect x="50" y="296" width="36" height="28" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="68" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="white">20</text>
  <text x="96" y="315" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="106" y="296" width="36" height="28" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="124" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="white">30</text>
  <text x="152" y="315" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="162" y="296" width="36" height="28" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="180" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="white">40</text>
  <text x="208" y="315" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="218" y="296" width="36" height="28" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="236" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="white">50</text>
  <text x="264" y="315" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="274" y="296" width="36" height="28" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="292" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="white">60</text>
  <text x="320" y="315" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="330" y="296" width="36" height="28" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="348" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="white">70</text>
  <text x="376" y="315" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="386" y="296" width="36" height="28" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="404" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="white">80</text>

  <text x="50" y="350" font-size="12" fill="#555">
    <tspan font-weight="bold" fill="#27ae60">Key property:</tspan> In-order on a BST always produces <tspan font-weight="bold">sorted output</tspan>.
  </text>
  <text x="50" y="368" font-size="12" fill="#888">Use: verify BST correctness, print sorted data.</text>

  <!-- ===== 2. PRE-ORDER: Root -> Left -> Right ===== -->
  <rect x="30" y="392" width="800" height="120" rx="8" fill="#eaf2f8" stroke="#3498db" stroke-width="1.5"/>

  <text x="50" y="416" font-size="15" font-weight="bold" fill="#3498db">Pre-Order</text>
  <text x="168" y="416" font-size="13" fill="#555"><tspan font-weight="bold">Root</tspan> &#x2192; Left &#x2192; Right</text>

  <!-- Visit sequence boxes -->
  <rect x="50" y="430" width="36" height="28" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="68" y="449" text-anchor="middle" font-size="13" font-weight="bold" fill="white">50</text>
  <text x="96" y="449" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="106" y="430" width="36" height="28" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="124" y="449" text-anchor="middle" font-size="13" font-weight="bold" fill="white">30</text>
  <text x="152" y="449" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="162" y="430" width="36" height="28" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="180" y="449" text-anchor="middle" font-size="13" font-weight="bold" fill="white">20</text>
  <text x="208" y="449" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="218" y="430" width="36" height="28" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="236" y="449" text-anchor="middle" font-size="13" font-weight="bold" fill="white">40</text>
  <text x="264" y="449" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="274" y="430" width="36" height="28" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="292" y="449" text-anchor="middle" font-size="13" font-weight="bold" fill="white">70</text>
  <text x="320" y="449" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="330" y="430" width="36" height="28" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="348" y="449" text-anchor="middle" font-size="13" font-weight="bold" fill="white">60</text>
  <text x="376" y="449" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="386" y="430" width="36" height="28" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="404" y="449" text-anchor="middle" font-size="13" font-weight="bold" fill="white">80</text>

  <text x="50" y="484" font-size="12" fill="#555">
    <tspan font-weight="bold" fill="#3498db">Key property:</tspan> Root is always <tspan font-weight="bold">first</tspan>. Inserting values in this order rebuilds the identical tree.
  </text>
  <text x="50" y="502" font-size="12" fill="#888">Use: clone/serialize a tree, copy tree structure.</text>

  <!-- ===== 3. POST-ORDER: Left -> Right -> Root ===== -->
  <rect x="30" y="526" width="800" height="120" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>

  <text x="50" y="550" font-size="15" font-weight="bold" fill="#e67e22">Post-Order</text>
  <text x="176" y="550" font-size="13" fill="#555">Left &#x2192; Right &#x2192; <tspan font-weight="bold">Root</tspan></text>

  <!-- Visit sequence boxes -->
  <rect x="50" y="564" width="36" height="28" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="68" y="583" text-anchor="middle" font-size="13" font-weight="bold" fill="white">20</text>
  <text x="96" y="583" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="106" y="564" width="36" height="28" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="124" y="583" text-anchor="middle" font-size="13" font-weight="bold" fill="white">40</text>
  <text x="152" y="583" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="162" y="564" width="36" height="28" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="180" y="583" text-anchor="middle" font-size="13" font-weight="bold" fill="white">30</text>
  <text x="208" y="583" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="218" y="564" width="36" height="28" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="236" y="583" text-anchor="middle" font-size="13" font-weight="bold" fill="white">60</text>
  <text x="264" y="583" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="274" y="564" width="36" height="28" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="292" y="583" text-anchor="middle" font-size="13" font-weight="bold" fill="white">80</text>
  <text x="320" y="583" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="330" y="564" width="36" height="28" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="348" y="583" text-anchor="middle" font-size="13" font-weight="bold" fill="white">70</text>
  <text x="376" y="583" text-anchor="middle" font-size="14" fill="#bdc3c7">&#x2192;</text>
  <rect x="386" y="564" width="36" height="28" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="404" y="583" text-anchor="middle" font-size="13" font-weight="bold" fill="white">50</text>

  <text x="50" y="618" font-size="12" fill="#555">
    <tspan font-weight="bold" fill="#e67e22">Key property:</tspan> Children are always visited <tspan font-weight="bold">before</tspan> their parent. Root is always <tspan font-weight="bold">last</tspan>.
  </text>
  <text x="50" y="636" font-size="12" fill="#888">Use: safe deletion (destroy_), expression tree evaluation.</text>

  <!-- ===== Mnemonic key ===== -->
  <text x="560" y="282" font-size="12" fill="#555" font-style="italic">
    <tspan font-weight="bold">Mnemonic:</tspan> the name tells you when the <tspan font-weight="bold">root</tspan> is visited:
  </text>
  <text x="560" y="300" font-size="12" fill="#27ae60" font-weight="bold">In</text>
  <text x="577" y="300" font-size="12" fill="#555">= root in the middle</text>
  <text x="560" y="318" font-size="12" fill="#3498db" font-weight="bold">Pre</text>
  <text x="582" y="318" font-size="12" fill="#555">= root before (first)</text>
  <text x="560" y="336" font-size="12" fill="#e67e22" font-weight="bold">Post</text>
  <text x="588" y="336" font-size="12" fill="#555">= root after (last)</text>
</svg>