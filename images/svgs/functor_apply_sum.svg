<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">inorder_apply(SumFunctor)</text>
  <text x="430" y="48" text-anchor="middle" font-size="13" fill="#888">Stateful functor &#x2014; accumulates a running total as the traversal visits each node</text>

  <!-- ===== CODE: usage + functor (left) ===== -->
  <rect x="30" y="66" width="380" height="128" rx="8" fill="#1e1e1e"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="11">
    <tspan x="50" y="86" fill="#6a9955">// usage:</tspan>
    <tspan x="50" y="104" fill="#4ec9b0">SumFunctor</tspan><tspan fill="#9cdcfe"> sum</tspan><tspan fill="#d4d4d4">;</tspan><tspan fill="#6a9955">            // sum.total = 0</tspan>
    <tspan x="50" y="122" fill="#9cdcfe">tree</tspan><tspan fill="#d4d4d4">.</tspan><tspan fill="#dcdcaa">inorder_apply</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">sum</tspan><tspan fill="#d4d4d4">);</tspan><tspan fill="#6a9955">  // traverses tree</tspan>
    <tspan x="50" y="140" fill="#9cdcfe">std::cout</tspan><tspan fill="#d4d4d4"> &lt;&lt; </tspan><tspan fill="#9cdcfe">sum</tspan><tspan fill="#d4d4d4">.</tspan><tspan fill="#9cdcfe">total</tspan><tspan fill="#d4d4d4">;</tspan><tspan fill="#6a9955">  // 210</tspan>
    <tspan x="50" y="164" fill="#6a9955">// SumFunctor::operator():</tspan>
    <tspan x="50" y="182" fill="#9cdcfe">total</tspan><tspan fill="#d4d4d4"> += value;</tspan><tspan fill="#6a9955">             // state accumulates</tspan>
  </text>

  <!-- ===== TREE (right): 50,30,70,20,40 ===== -->
  <text x="590" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#888">Tree:</text>
  <line x1="590" y1="112" x2="530" y2="138" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="590" y1="112" x2="650" y2="138" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="530" y1="174" x2="500" y2="194" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="530" y1="174" x2="560" y2="194" stroke="#bdc3c7" stroke-width="1.5"/>
  <circle cx="590" cy="96" r="16" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="590" y="101" text-anchor="middle" font-size="11" font-weight="bold" fill="white">50</text>
  <circle cx="530" cy="156" r="16" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="530" y="161" text-anchor="middle" font-size="11" font-weight="bold" fill="white">30</text>
  <circle cx="650" cy="156" r="16" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="650" y="161" text-anchor="middle" font-size="11" font-weight="bold" fill="white">70</text>
  <circle cx="500" cy="210" r="16" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="500" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="white">20</text>
  <circle cx="560" cy="210" r="16" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="560" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="white">40</text>

  <!-- ===== TRACE: state changes at each node ===== -->
  <text x="430" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">In-Order: total Accumulates at Each Node</text>

  <rect x="30" y="264" width="120" height="56" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="90" y="282" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#888">start</text>
  <text x="90" y="300" text-anchor="middle" font-size="10" fill="#555">total = <tspan font-weight="bold">0</tspan></text>
  <text x="90" y="314" text-anchor="middle" font-size="9" fill="#bdc3c7">(initialized)</text>

  <text x="160" y="296" font-size="14" fill="#bdc3c7">&#x2192;</text>

  <rect x="174" y="264" width="120" height="56" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="234" y="282" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#555">sum(20)</text>
  <text x="234" y="300" text-anchor="middle" font-size="11" fill="#e67e22">total = <tspan font-weight="bold">20</tspan></text>
  <text x="234" y="314" text-anchor="middle" font-size="9" fill="#888">0 + 20</text>

  <text x="304" y="296" font-size="14" fill="#bdc3c7">&#x2192;</text>

  <rect x="318" y="264" width="120" height="56" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="378" y="282" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#555">sum(30)</text>
  <text x="378" y="300" text-anchor="middle" font-size="11" fill="#e67e22">total = <tspan font-weight="bold">50</tspan></text>
  <text x="378" y="314" text-anchor="middle" font-size="9" fill="#888">20 + 30</text>

  <text x="448" y="296" font-size="14" fill="#bdc3c7">&#x2192;</text>

  <rect x="462" y="264" width="120" height="56" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="522" y="282" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#555">sum(40)</text>
  <text x="522" y="300" text-anchor="middle" font-size="11" fill="#e67e22">total = <tspan font-weight="bold">90</tspan></text>
  <text x="522" y="314" text-anchor="middle" font-size="9" fill="#888">50 + 40</text>

  <text x="592" y="296" font-size="14" fill="#bdc3c7">&#x2192;</text>

  <rect x="606" y="264" width="110" height="56" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="661" y="282" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#555">sum(50)</text>
  <text x="661" y="300" text-anchor="middle" font-size="11" fill="#e67e22">total = <tspan font-weight="bold">140</tspan></text>
  <text x="661" y="314" text-anchor="middle" font-size="9" fill="#888">90 + 50</text>

  <text x="726" y="296" font-size="14" fill="#bdc3c7">&#x2192;</text>

  <rect x="740" y="264" width="90" height="56" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="785" y="282" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#555">sum(70)</text>
  <text x="785" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">210</text>
  <text x="785" y="314" text-anchor="middle" font-size="9" fill="#888">140 + 70</text>

  <!-- Result -->
  <text x="430" y="348" text-anchor="middle" font-size="13" fill="#555">After traversal: <tspan font-family="Consolas, 'Courier New', monospace" font-weight="bold" fill="#e67e22">sum.total = 210</tspan>  (20+30+40+50+70)</text>

  <!-- Footer -->
  <rect x="30" y="370" width="800" height="78" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="394" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Why This Works</text>
  <text x="80" y="416" font-size="12" fill="#555">
    <tspan font-family="Consolas, 'Courier New', monospace">sum</tspan> is passed <tspan font-weight="bold">by reference</tspan> &#x2014; every call to <tspan font-family="Consolas, 'Courier New', monospace">sum(value)</tspan> updates the <tspan font-weight="bold">same object</tspan>.
  </text>
  <text x="80" y="436" font-size="12" fill="#555">
    The traversal walks the tree; the functor accumulates. Read <tspan font-family="Consolas, 'Courier New', monospace">sum.total</tspan> after the traversal completes.
  </text>
</svg>