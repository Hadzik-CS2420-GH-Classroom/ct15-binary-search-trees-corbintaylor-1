<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">destroy_() &#x2014; Post-Order Deletion</text>
  <text x="450" y="52" text-anchor="middle" fill="#777" font-size="13">Children must be freed BEFORE parent &#x2014; otherwise we lose the pointers to them</text>

  <!-- Code block -->
  <rect x="30" y="70" width="380" height="130" rx="8" fill="#1e1e1e"/>
  <text x="50" y="95" fill="#569cd6" font-size="12" font-family="Consolas, monospace">void <tspan fill="#dcdcaa">destroy_</tspan>(<tspan fill="#4ec9b0">Node</tspan>* <tspan fill="#9cdcfe">node</tspan>) {</text>
  <text x="70" y="115" fill="#569cd6" font-size="12" font-family="Consolas, monospace">if <tspan fill="#d4d4d4">(!</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">)</tspan> return<tspan fill="#d4d4d4">;</tspan></text>
  <text x="70" y="138" fill="#dcdcaa" font-size="12" font-family="Consolas, monospace">destroy_<tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">left</tspan><tspan fill="#d4d4d4">);</tspan>  <tspan fill="#6a9955">// 1. free left subtree</tspan></text>
  <text x="70" y="158" fill="#dcdcaa" font-size="12" font-family="Consolas, monospace">destroy_<tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">right</tspan><tspan fill="#d4d4d4">);</tspan> <tspan fill="#6a9955">// 2. free right subtree</tspan></text>
  <text x="70" y="178" fill="#569cd6" font-size="12" font-family="Consolas, monospace">delete <tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">;</tspan>             <tspan fill="#6a9955">// 3. NOW safe to free parent</tspan></text>
  <text x="50" y="195" fill="#569cd6" font-size="12" font-family="Consolas, monospace">}</text>

  <!-- Tree with deletion order -->
  <text x="670" y="90" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">Deletion Order</text>

  <!-- Tree nodes -->
  <!-- 50 (root) - deleted LAST (#7) -->
  <circle cx="670" cy="130" r="22" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <text x="670" y="135" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">50</text>
  <circle cx="692" cy="115" r="10" fill="#e74c3c"/>
  <text x="692" y="119" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">7</text>

  <!-- Lines -->
  <line x1="652" y1="148" x2="600" y2="188" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="688" y1="148" x2="740" y2="188" stroke="#bdc3c7" stroke-width="2"/>

  <!-- 30 - deleted #3 -->
  <circle cx="600" cy="210" r="22" fill="#fff" stroke="#e67e22" stroke-width="2"/>
  <text x="600" y="215" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">30</text>
  <circle cx="622" cy="195" r="10" fill="#e67e22"/>
  <text x="622" y="199" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">3</text>

  <!-- 70 - deleted #6 -->
  <circle cx="740" cy="210" r="22" fill="#fff" stroke="#e67e22" stroke-width="2"/>
  <text x="740" y="215" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">70</text>
  <circle cx="762" cy="195" r="10" fill="#e67e22"/>
  <text x="762" y="199" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">6</text>

  <!-- Lines to leaves -->
  <line x1="584" y1="228" x2="520" y2="268" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="616" y1="228" x2="650" y2="268" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="724" y1="228" x2="730" y2="268" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="756" y1="228" x2="830" y2="268" stroke="#bdc3c7" stroke-width="2"/>

  <!-- 20 - deleted #1 (first!) -->
  <circle cx="520" cy="290" r="22" fill="#eafaf1" stroke="#27ae60" stroke-width="2.5"/>
  <text x="520" y="295" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">20</text>
  <circle cx="542" cy="275" r="10" fill="#27ae60"/>
  <text x="542" y="279" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">1</text>

  <!-- 40 - deleted #2 -->
  <circle cx="650" cy="290" r="22" fill="#eafaf1" stroke="#27ae60" stroke-width="2.5"/>
  <text x="650" y="295" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">40</text>
  <circle cx="672" cy="275" r="10" fill="#27ae60"/>
  <text x="672" y="279" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">2</text>

  <!-- 60 - deleted #4 -->
  <circle cx="730" cy="290" r="22" fill="#eafaf1" stroke="#27ae60" stroke-width="2.5"/>
  <text x="730" y="295" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">60</text>
  <circle cx="752" cy="275" r="10" fill="#27ae60"/>
  <text x="752" y="279" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">4</text>

  <!-- 80 - deleted #5 -->
  <circle cx="830" cy="290" r="22" fill="#eafaf1" stroke="#27ae60" stroke-width="2.5"/>
  <text x="830" y="295" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">80</text>
  <circle cx="852" cy="275" r="10" fill="#27ae60"/>
  <text x="852" y="279" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">5</text>

  <!-- Legend -->
  <circle cx="540" cy="345" r="8" fill="#27ae60"/>
  <text x="555" y="349" fill="#555" font-size="12">Leaves freed first (no children to lose)</text>
  <circle cx="540" cy="368" r="8" fill="#e67e22"/>
  <text x="555" y="372" fill="#555" font-size="12">Internal nodes freed after both children</text>
  <circle cx="540" cy="391" r="8" fill="#e74c3c"/>
  <text x="555" y="395" fill="#555" font-size="12">Root freed last</text>

  <!-- Why box -->
  <rect x="30" y="420" width="840" height="86" rx="10" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="450" y="444" text-anchor="middle" fill="#922b21" font-size="14" font-weight="bold">Why post-order? What happens if we delete the parent first?</text>
  <text x="50" y="468" fill="#555" font-size="12">If we <tspan font-weight="bold" fill="#c0392b">delete 50 first</tspan>, we lose <tspan font-family="Consolas, monospace">node->left</tspan> (30) and <tspan font-family="Consolas, monospace">node->right</tspan> (70) &#x2014; those pointers are inside the deleted node.</text>
  <text x="50" y="490" fill="#555" font-size="12">The entire left and right subtrees become <tspan font-weight="bold" fill="#c0392b">unreachable memory leaks</tspan>. Post-order guarantees children are freed first.</text>
</svg>
