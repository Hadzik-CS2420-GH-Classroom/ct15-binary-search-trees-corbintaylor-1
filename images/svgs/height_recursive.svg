<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 530" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">height_() &#x2014; Recursive Height Calculation</text>
  <text x="450" y="52" text-anchor="middle" fill="#777" font-size="13">Height = edges on the longest root-to-leaf path. Base case: nullptr returns -1.</text>

  <!-- Code block -->
  <rect x="30" y="70" width="400" height="110" rx="8" fill="#1e1e1e"/>
  <text x="50" y="95" fill="#569cd6" font-size="12" font-family="Consolas, monospace">int <tspan fill="#dcdcaa">height_</tspan>(<tspan fill="#4ec9b0">Node</tspan>* <tspan fill="#9cdcfe">node</tspan>) <tspan fill="#569cd6">const</tspan> {</text>
  <text x="70" y="115" fill="#569cd6" font-size="12" font-family="Consolas, monospace">if <tspan fill="#d4d4d4">(!</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">)</tspan> return <tspan fill="#b5cea8">-1</tspan><tspan fill="#d4d4d4">;</tspan>  <tspan fill="#6a9955">// base case</tspan></text>
  <text x="70" y="138" fill="#569cd6" font-size="12" font-family="Consolas, monospace">return <tspan fill="#b5cea8">1</tspan> + <tspan fill="#dcdcaa">std::max</tspan><tspan fill="#d4d4d4">(</tspan></text>
  <text x="110" y="158" fill="#dcdcaa" font-size="12" font-family="Consolas, monospace">height_<tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">node</tspan>-><tspan fill="#9cdcfe">left</tspan><tspan fill="#d4d4d4">),</tspan> height_<tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">node</tspan>-><tspan fill="#9cdcfe">right</tspan><tspan fill="#d4d4d4">));</tspan></text>
  <text x="50" y="175" fill="#569cd6" font-size="12" font-family="Consolas, monospace">}</text>

  <!-- Tree with height values -->
  <text x="670" y="90" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">Height at Each Node</text>

  <!-- 50 (root) h=2 -->
  <circle cx="670" cy="130" r="24" fill="#3498db" stroke="#2471a3" stroke-width="2"/>
  <text x="670" y="135" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">50</text>
  <text x="700" y="120" fill="#e74c3c" font-size="12" font-weight="bold">h=2</text>

  <line x1="650" y1="150" x2="600" y2="190" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="690" y1="150" x2="740" y2="190" stroke="#bdc3c7" stroke-width="2"/>

  <!-- 30 h=1 -->
  <circle cx="600" cy="210" r="24" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="600" y="215" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">30</text>
  <text x="630" y="200" fill="#e74c3c" font-size="12" font-weight="bold">h=1</text>

  <!-- 70 h=1 -->
  <circle cx="740" cy="210" r="24" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="740" y="215" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">70</text>
  <text x="770" y="200" fill="#e74c3c" font-size="12" font-weight="bold">h=1</text>

  <line x1="582" y1="230" x2="530" y2="270" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="618" y1="230" x2="660" y2="270" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="722" y1="230" x2="720" y2="270" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="758" y1="230" x2="810" y2="270" stroke="#bdc3c7" stroke-width="2"/>

  <!-- Leaves h=0 -->
  <circle cx="530" cy="290" r="22" fill="#f39c12" stroke="#d68910" stroke-width="2"/>
  <text x="530" y="295" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">20</text>
  <text x="558" y="282" fill="#e74c3c" font-size="11" font-weight="bold">h=0</text>

  <circle cx="660" cy="290" r="22" fill="#f39c12" stroke="#d68910" stroke-width="2"/>
  <text x="660" y="295" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">40</text>
  <text x="688" y="282" fill="#e74c3c" font-size="11" font-weight="bold">h=0</text>

  <circle cx="720" cy="290" r="22" fill="#f39c12" stroke="#d68910" stroke-width="2"/>
  <text x="720" y="295" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">60</text>
  <text x="748" y="282" fill="#e74c3c" font-size="11" font-weight="bold">h=0</text>

  <circle cx="810" cy="290" r="22" fill="#f39c12" stroke="#d68910" stroke-width="2"/>
  <text x="810" y="295" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">80</text>
  <text x="838" y="282" fill="#e74c3c" font-size="11" font-weight="bold">h=0</text>

  <!-- Calculation walkthrough -->
  <rect x="30" y="200" width="400" height="220" rx="10" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="230" y="224" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">How the Math Works (bottom-up)</text>

  <text x="50" y="246" fill="#8e44ad" font-size="12" font-weight="bold">Why +1?</text>
  <text x="50" y="262" fill="#555" font-size="11">The +1 counts the <tspan font-weight="bold">edge</tspan> from this node down</text>
  <text x="50" y="276" fill="#555" font-size="11">to its tallest child. Height = number of edges.</text>

  <text x="50" y="300" fill="#f39c12" font-size="12" font-weight="bold">Leaves (20, 40, 60, 80):</text>
  <text x="50" y="318" fill="#555" font-size="12" font-family="Consolas, monospace">1 + max(<tspan fill="#b5cea8">-1</tspan>, <tspan fill="#b5cea8">-1</tspan>) = 1 + (-1) = <tspan fill="#e74c3c" font-weight="bold">0</tspan></text>

  <text x="50" y="346" fill="#27ae60" font-size="12" font-weight="bold">Node 30 (children h=0, h=0):</text>
  <text x="50" y="364" fill="#555" font-size="12" font-family="Consolas, monospace">1 + max(<tspan fill="#b5cea8">0</tspan>, <tspan fill="#b5cea8">0</tspan>) = 1 + 0 = <tspan fill="#e74c3c" font-weight="bold">1</tspan></text>

  <text x="50" y="392" fill="#3498db" font-size="12" font-weight="bold">Root 50 (children h=1, h=1):</text>
  <text x="50" y="410" fill="#555" font-size="12" font-family="Consolas, monospace">1 + max(<tspan fill="#b5cea8">1</tspan>, <tspan fill="#b5cea8">1</tspan>) = 1 + 1 = <tspan fill="#e74c3c" font-weight="bold">2</tspan></text>

  <!-- Key insight -->
  <rect x="30" y="440" width="840" height="76" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="450" y="464" text-anchor="middle" fill="#1a5276" font-size="14" font-weight="bold">Key Insight</text>
  <text x="50" y="488" fill="#555" font-size="12">Height is computed <tspan font-weight="bold">bottom-up</tspan>: base cases (nullptr = -1) bubble up through <tspan font-family="Consolas, monospace">max()</tspan>, adding 1 at each level.</text>
  <text x="50" y="508" fill="#555" font-size="12">This is the same pattern as many tree algorithms: <tspan font-weight="bold">solve children first, combine results at parent</tspan>.</text>
</svg>
