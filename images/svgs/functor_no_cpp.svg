<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">Why Is There No Functors.cpp?</text>
  <text x="430" y="48" text-anchor="middle" font-size="13" fill="#888">Everything is defined directly in the .h file &#x2014; here&#x2019;s why</text>

  <!-- ===== The typical pattern ===== -->
  <rect x="30" y="70" width="385" height="140" rx="8" fill="#eaf2f8" stroke="#3498db" stroke-width="1.5"/>
  <text x="222" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#3498db">Typical Pattern: .h + .cpp</text>

  <text x="50" y="118" font-size="12" fill="#555">
    <tspan font-family="Consolas, 'Courier New', monospace" font-weight="bold">BinarySearchTree.h</tspan>
  </text>
  <text x="60" y="136" font-size="12" fill="#555">Declares the class and its methods</text>
  <text x="50" y="158" font-size="12" fill="#555">
    <tspan font-family="Consolas, 'Courier New', monospace" font-weight="bold">BinarySearchTree.cpp</tspan>
  </text>
  <text x="60" y="176" font-size="12" fill="#555">Defines (implements) those methods</text>
  <text x="50" y="198" font-size="12" fill="#888">Split needed when methods have substantial bodies</text>

  <!-- ===== Functors: everything in .h ===== -->
  <rect x="445" y="70" width="385" height="140" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="637" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">Functors: .h Only</text>

  <text x="465" y="118" font-size="12" fill="#555">
    <tspan font-family="Consolas, 'Courier New', monospace" font-weight="bold">Functors.h</tspan>
  </text>
  <text x="475" y="136" font-size="12" fill="#555">Declares AND defines each struct</text>
  <text x="465" y="158" font-size="12" fill="#555">
    <tspan font-family="Consolas, 'Courier New', monospace" font-weight="bold" fill="#888">Functors.cpp</tspan>
    <tspan fill="#e74c3c"> &#x2190; doesn&#x2019;t exist</tspan>
  </text>
  <text x="475" y="176" font-size="12" fill="#555">Nothing to put in it!</text>
  <text x="475" y="198" font-size="12" fill="#888">Each struct is so small it fits right in the header</text>

  <!-- ===== Three reasons ===== -->
  <rect x="30" y="228" width="800" height="158" rx="8" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="430" y="252" text-anchor="middle" font-size="14" font-weight="bold" fill="#8e44ad">Three Reasons the Functors Live Entirely in the .h</text>

  <text x="50" y="278" font-size="12" font-weight="bold" fill="#8e44ad">1. They&#x2019;re tiny.</text>
  <text x="70" y="294" font-size="12" fill="#555">Each struct is 3&#x2013;5 lines. A .cpp would add complexity with no benefit.</text>

  <text x="50" y="316" font-size="12" font-weight="bold" fill="#8e44ad">2. The compiler needs to see operator().</text>
  <text x="70" y="332" font-size="12" fill="#555">The template calls <tspan font-family="Consolas, 'Courier New', monospace">func(node-&gt;data)</tspan> &#x2014; it must see the functor&#x2019;s body to generate code.</text>

  <text x="50" y="354" font-size="12" font-weight="bold" fill="#8e44ad">3. This is normal C++ practice.</text>
  <text x="70" y="370" font-size="12" fill="#555">Small structs are commonly defined entirely in headers &#x2014; you&#x2019;ll see this in the standard library.</text>

  <!-- Footer -->
  <rect x="30" y="402" width="800" height="26" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="420" text-anchor="middle" font-size="12" fill="#555">
    Rule of thumb: if the entire implementation fits in a few lines, it can live in the .h. No .cpp needed.
  </text>
</svg>