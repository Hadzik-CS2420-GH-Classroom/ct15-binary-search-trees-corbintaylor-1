<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">inorder_apply(CountFunctor)</text>
  <text x="430" y="48" text-anchor="middle" font-size="13" fill="#888">Stateful functor &#x2014; counts nodes visited, ignores the actual values</text>

  <!-- ===== CODE: usage + functor (left) ===== -->
  <rect x="30" y="66" width="380" height="128" rx="8" fill="#1e1e1e"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="11">
    <tspan x="50" y="86" fill="#6a9955">// usage:</tspan>
    <tspan x="50" y="104" fill="#4ec9b0">CountFunctor</tspan><tspan fill="#9cdcfe"> counter</tspan><tspan fill="#d4d4d4">;</tspan><tspan fill="#6a9955">    // counter.count = 0</tspan>
    <tspan x="50" y="122" fill="#9cdcfe">tree</tspan><tspan fill="#d4d4d4">.</tspan><tspan fill="#dcdcaa">inorder_apply</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">counter</tspan><tspan fill="#d4d4d4">);</tspan><tspan fill="#6a9955"> // traverses tree</tspan>
    <tspan x="50" y="140" fill="#9cdcfe">std::cout</tspan><tspan fill="#d4d4d4"> &lt;&lt; </tspan><tspan fill="#9cdcfe">counter</tspan><tspan fill="#d4d4d4">.</tspan><tspan fill="#9cdcfe">count</tspan><tspan fill="#d4d4d4">;</tspan><tspan fill="#6a9955"> // 5</tspan>
    <tspan x="50" y="164" fill="#6a9955">// CountFunctor::operator():</tspan>
    <tspan x="50" y="182" fill="#d4d4d4">(</tspan><tspan fill="#569cd6">void</tspan><tspan fill="#d4d4d4">)value;</tspan><tspan fill="#6a9955">  // ignore the value</tspan>
    <tspan x="50" y="192" fill="#9cdcfe">count</tspan><tspan fill="#d4d4d4">++;</tspan><tspan fill="#6a9955">         // just increment</tspan>
  </text>

  <!-- ===== TREE (right): 50,30,70,20,40 ===== -->
  <text x="590" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#888">Tree:</text>
  <line x1="590" y1="112" x2="530" y2="138" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="590" y1="112" x2="650" y2="138" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="530" y1="174" x2="500" y2="194" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="530" y1="174" x2="560" y2="194" stroke="#bdc3c7" stroke-width="1.5"/>
  <circle cx="590" cy="96" r="16" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="590" y="101" text-anchor="middle" font-size="11" font-weight="bold" fill="white">50</text>
  <circle cx="530" cy="156" r="16" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="530" y="161" text-anchor="middle" font-size="11" font-weight="bold" fill="white">30</text>
  <circle cx="650" cy="156" r="16" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="650" y="161" text-anchor="middle" font-size="11" font-weight="bold" fill="white">70</text>
  <circle cx="500" cy="210" r="16" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="500" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="white">20</text>
  <circle cx="560" cy="210" r="16" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="560" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="white">40</text>

  <text x="720" y="100" font-size="12" fill="#555">5 nodes</text>

  <!-- ===== TRACE: count increments at each node ===== -->
  <text x="430" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">In-Order: count++ at Each Node (Value Ignored)</text>

  <rect x="40" y="264" width="116" height="56" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="98" y="282" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#888">start</text>
  <text x="98" y="300" text-anchor="middle" font-size="11" fill="#555">count = <tspan font-weight="bold">0</tspan></text>

  <text x="166" y="296" font-size="14" fill="#bdc3c7">&#x2192;</text>

  <rect x="180" y="264" width="116" height="56" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="238" y="280" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#555">counter(<tspan fill="#888">20</tspan>)</text>
  <text x="238" y="298" text-anchor="middle" font-size="11" fill="#27ae60">count = <tspan font-weight="bold">1</tspan></text>
  <text x="238" y="314" text-anchor="middle" font-size="9" fill="#888">value ignored</text>

  <text x="306" y="296" font-size="14" fill="#bdc3c7">&#x2192;</text>

  <rect x="320" y="264" width="116" height="56" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="378" y="280" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#555">counter(<tspan fill="#888">30</tspan>)</text>
  <text x="378" y="298" text-anchor="middle" font-size="11" fill="#27ae60">count = <tspan font-weight="bold">2</tspan></text>
  <text x="378" y="314" text-anchor="middle" font-size="9" fill="#888">value ignored</text>

  <text x="446" y="296" font-size="14" fill="#bdc3c7">&#x2192;</text>

  <rect x="460" y="264" width="116" height="56" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="518" y="280" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#555">counter(<tspan fill="#888">40</tspan>)</text>
  <text x="518" y="298" text-anchor="middle" font-size="11" fill="#27ae60">count = <tspan font-weight="bold">3</tspan></text>

  <text x="586" y="296" font-size="14" fill="#bdc3c7">&#x2192;</text>

  <rect x="600" y="264" width="68" height="56" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
  <text x="634" y="282" text-anchor="middle" font-size="10" fill="#888">...</text>
  <text x="634" y="300" text-anchor="middle" font-size="11" fill="#27ae60"><tspan font-weight="bold">4</tspan></text>

  <text x="678" y="296" font-size="14" fill="#bdc3c7">&#x2192;</text>

  <rect x="692" y="264" width="116" height="56" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="750" y="280" text-anchor="middle" font-size="10" font-family="Consolas, 'Courier New', monospace" fill="#555">counter(<tspan fill="#888">70</tspan>)</text>
  <text x="750" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">5</text>
  <text x="750" y="314" text-anchor="middle" font-size="9" fill="#27ae60">final &#x2713;</text>

  <!-- Result -->
  <text x="430" y="348" text-anchor="middle" font-size="13" fill="#555">After traversal: <tspan font-family="Consolas, 'Courier New', monospace" font-weight="bold" fill="#27ae60">counter.count = 5</tspan></text>

  <!-- Footer -->
  <rect x="30" y="370" width="800" height="78" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="394" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">A Functor Doesn&#x2019;t Have to Use the Value</text>
  <text x="80" y="416" font-size="12" fill="#555">
    <tspan font-family="Consolas, 'Courier New', monospace">(void)value;</tspan> tells the compiler we intentionally ignore it &#x2014; we only care about the count.
  </text>
  <text x="80" y="436" font-size="12" fill="#555">
    <tspan font-family="Consolas, 'Courier New', monospace">operator()</tspan> must accept <tspan font-family="Consolas, 'Courier New', monospace">int value</tspan> because <tspan font-family="Consolas, 'Courier New', monospace">inorder_apply_</tspan> calls <tspan font-family="Consolas, 'Courier New', monospace">func(node-&gt;data)</tspan> &#x2014; the signature must match.
  </text>
</svg>