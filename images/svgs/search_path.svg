<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">BST Search: Halving at Each Step</text>
  <text x="430" y="48" text-anchor="middle" font-size="13" fill="#888">Each comparison eliminates one entire subtree &#x2014; O(log n) on a balanced tree</text>

  <!-- ===== CODE BLOCK (top) ===== -->
  <rect x="30" y="64" width="800" height="110" rx="8" fill="#1e1e1e"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="11">
    <tspan x="50" y="84" fill="#569cd6">bool</tspan><tspan fill="#dcdcaa"> search_</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#4ec9b0">Node</tspan><tspan fill="#d4d4d4">* </tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">, </tspan><tspan fill="#569cd6">int</tspan><tspan fill="#d4d4d4"> </tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4">) </tspan><tspan fill="#569cd6">const</tspan><tspan fill="#d4d4d4"> {</tspan>
    <tspan x="70" y="104" fill="#c586c0">if</tspan><tspan fill="#d4d4d4"> (!</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#b5cea8"> false</tspan><tspan fill="#d4d4d4">;</tspan><tspan fill="#6a9955">                   // fell off the tree &#x2192; not found</tspan>
    <tspan x="70" y="124" fill="#c586c0">if</tspan><tspan fill="#d4d4d4"> (</tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4"> == </tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">data</tspan><tspan fill="#d4d4d4">) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#b5cea8"> true</tspan><tspan fill="#d4d4d4">;</tspan><tspan fill="#6a9955">    // found it!</tspan>
    <tspan x="70" y="144" fill="#c586c0">if</tspan><tspan fill="#d4d4d4"> (</tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4"> &lt; </tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">data</tspan><tspan fill="#d4d4d4">)</tspan>
    <tspan x="90" y="160" fill="#c586c0">return</tspan><tspan fill="#dcdcaa"> search_</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">left</tspan><tspan fill="#d4d4d4">, </tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4">);</tspan><tspan fill="#6a9955">  // less &#x2192; go left (eliminates right subtree)</tspan>
  </text>

  <!-- ===== TWO EXAMPLES SIDE BY SIDE ===== -->
  <!-- LEFT: search(40) — FOUND -->
  <text x="215" y="200" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">search(40) &#x2014; <tspan fill="#27ae60">Found!</tspan></text>

  <!-- Tree: center=215, L0 y=230, L1 y=300, L2 y=370 -->
  <line x1="215" y1="254" x2="140" y2="276" stroke="#e67e22" stroke-width="3"/>
  <line x1="215" y1="254" x2="290" y2="276" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="140" y1="324" x2="100" y2="346" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="140" y1="324" x2="180" y2="346" stroke="#e67e22" stroke-width="3"/>
  <line x1="290" y1="324" x2="250" y2="346" stroke="#ddd" stroke-width="1.5"/>
  <line x1="290" y1="324" x2="330" y2="346" stroke="#ddd" stroke-width="1.5"/>

  <!-- L0: 50 -->
  <circle cx="215" cy="230" r="22" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="215" y="236" text-anchor="middle" font-size="14" font-weight="bold" fill="white">50</text>
  <text x="244" y="224" font-size="10" fill="#e67e22">40 &lt; 50 &#x2192; left</text>

  <!-- Eliminated right subtree -->
  <rect x="248" y="272" width="96" height="108" rx="6" fill="#e74c3c" fill-opacity="0.08" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="296" y="268" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="bold">ELIMINATED</text>

  <!-- L1: 30, 70 -->
  <circle cx="140" cy="300" r="22" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="140" y="306" text-anchor="middle" font-size="14" font-weight="bold" fill="white">30</text>
  <text x="164" y="294" font-size="10" fill="#e67e22">40 &gt; 30 &#x2192; right</text>

  <circle cx="290" cy="300" r="22" fill="#ddd" stroke="#bbb" stroke-width="1.5"/>
  <text x="290" y="306" text-anchor="middle" font-size="14" font-weight="bold" fill="#aaa">70</text>

  <!-- Eliminated left of 30 -->
  <rect x="74" y="342" width="56" height="56" rx="6" fill="#e74c3c" fill-opacity="0.08" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="102" y="338" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="bold">ELIMINATED</text>

  <!-- L2: 20, 40(FOUND), 60, 80 -->
  <circle cx="100" cy="370" r="22" fill="#ddd" stroke="#bbb" stroke-width="1.5"/>
  <text x="100" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="#aaa">20</text>

  <circle cx="180" cy="370" r="24" fill="#27ae60" stroke="#219a52" stroke-width="3"/>
  <text x="180" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="white">40</text>
  <text x="180" y="406" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">FOUND &#x2713;</text>

  <circle cx="250" cy="370" r="22" fill="#ddd" stroke="#bbb" stroke-width="1.5"/>
  <text x="250" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="#aaa">60</text>

  <circle cx="330" cy="370" r="22" fill="#ddd" stroke="#bbb" stroke-width="1.5"/>
  <text x="330" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="#aaa">80</text>

  <!-- ===== Vertical divider ===== -->
  <line x1="430" y1="190" x2="430" y2="420" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- RIGHT: search(45) — NOT FOUND -->
  <text x="645" y="200" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">search(45) &#x2014; <tspan fill="#e74c3c">Not Found</tspan></text>

  <!-- Tree: center=645, L0 y=230, L1 y=300, L2 y=370 -->
  <line x1="645" y1="254" x2="570" y2="276" stroke="#e67e22" stroke-width="3"/>
  <line x1="645" y1="254" x2="720" y2="276" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="570" y1="324" x2="530" y2="346" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="570" y1="324" x2="610" y2="346" stroke="#e67e22" stroke-width="3"/>
  <line x1="720" y1="324" x2="680" y2="346" stroke="#ddd" stroke-width="1.5"/>
  <line x1="720" y1="324" x2="760" y2="346" stroke="#ddd" stroke-width="1.5"/>

  <!-- L0: 50 -->
  <circle cx="645" cy="230" r="22" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="645" y="236" text-anchor="middle" font-size="14" font-weight="bold" fill="white">50</text>
  <text x="674" y="224" font-size="10" fill="#e67e22">45 &lt; 50 &#x2192; left</text>

  <!-- Eliminated right subtree -->
  <rect x="678" y="272" width="96" height="108" rx="6" fill="#e74c3c" fill-opacity="0.08" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="726" y="268" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="bold">ELIMINATED</text>

  <!-- L1: 30, 70 -->
  <circle cx="570" cy="300" r="22" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="570" y="306" text-anchor="middle" font-size="14" font-weight="bold" fill="white">30</text>
  <text x="594" y="294" font-size="10" fill="#e67e22">45 &gt; 30 &#x2192; right</text>

  <circle cx="720" cy="300" r="22" fill="#ddd" stroke="#bbb" stroke-width="1.5"/>
  <text x="720" y="306" text-anchor="middle" font-size="14" font-weight="bold" fill="#aaa">70</text>

  <!-- L2: 20, 40(visited), 60, 80 -->
  <circle cx="530" cy="370" r="22" fill="#ddd" stroke="#bbb" stroke-width="1.5"/>
  <text x="530" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="#aaa">20</text>

  <circle cx="610" cy="370" r="22" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="610" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="white">40</text>
  <text x="610" y="406" text-anchor="middle" font-size="10" fill="#e67e22">45 &gt; 40 &#x2192; right</text>

  <circle cx="680" cy="370" r="22" fill="#ddd" stroke="#bbb" stroke-width="1.5"/>
  <text x="680" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="#aaa">60</text>

  <circle cx="760" cy="370" r="22" fill="#ddd" stroke="#bbb" stroke-width="1.5"/>
  <text x="760" y="376" text-anchor="middle" font-size="14" font-weight="bold" fill="#aaa">80</text>

  <!-- nullptr indicator -->
  <line x1="630" y1="390" x2="646" y2="418" stroke="#e74c3c" stroke-width="2"/>
  <text x="656" y="432" font-size="11" font-weight="bold" fill="#e74c3c">nullptr</text>
  <text x="656" y="446" font-size="11" fill="#e74c3c">NOT FOUND &#x2717;</text>

  <!-- ===== Footer ===== -->
  <rect x="30" y="464" width="800" height="100" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>

  <text x="430" y="488" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">BST Search = Binary Search on a Linked Structure</text>

  <text x="80" y="512" font-size="12" fill="#555">
    <tspan font-weight="bold" fill="#27ae60">Found:</tspan> value matches node&#x2192;data &#x2192; return true.
    &#x2003;&#x2003;&#x2003;
    <tspan font-weight="bold" fill="#e74c3c">Not found:</tspan> we reach nullptr &#x2192; return false.
  </text>
  <text x="80" y="536" font-size="12" fill="#333">
    <tspan font-weight="bold">Comparisons:</tspan> at most height + 1.  Balanced tree: <tspan font-weight="bold" fill="#27ae60">O(log n)</tspan>.  Degenerate tree: <tspan font-weight="bold" fill="#e74c3c">O(n)</tspan>.
  </text>
</svg>