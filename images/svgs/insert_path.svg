<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">BST Insert: Path to a Leaf</text>
  <text x="430" y="48" text-anchor="middle" font-size="13" fill="#888">Each comparison routes left or right; the new node always lands as a leaf</text>

  <!-- ===== CODE BLOCK (top) ===== -->
  <rect x="30" y="64" width="800" height="120" rx="8" fill="#1e1e1e"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="11">
    <tspan x="50" y="84" fill="#4ec9b0">Node</tspan><tspan fill="#d4d4d4">* </tspan><tspan fill="#dcdcaa">insert_</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#4ec9b0">Node</tspan><tspan fill="#d4d4d4">* </tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">, </tspan><tspan fill="#569cd6">int</tspan><tspan fill="#d4d4d4"> </tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4">) {</tspan>
    <tspan x="70" y="104" fill="#c586c0">if</tspan><tspan fill="#d4d4d4"> (!</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#569cd6"> new</tspan><tspan fill="#4ec9b0"> Node</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4">);</tspan><tspan fill="#6a9955">    // base case: empty slot &#x2192; create leaf</tspan>
    <tspan x="70" y="124" fill="#c586c0">if</tspan><tspan fill="#d4d4d4"> (</tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4"> &lt; </tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">data</tspan><tspan fill="#d4d4d4">)</tspan>
    <tspan x="90" y="140" fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">left</tspan><tspan fill="#d4d4d4"> = </tspan><tspan fill="#dcdcaa">insert_</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">left</tspan><tspan fill="#d4d4d4">, </tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4">);</tspan><tspan fill="#6a9955">  // less &#x2192; go left</tspan>
    <tspan x="70" y="160" fill="#c586c0">else if</tspan><tspan fill="#d4d4d4"> (</tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4"> > </tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">data</tspan><tspan fill="#d4d4d4">)</tspan>
    <tspan x="90" y="176" fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">right</tspan><tspan fill="#d4d4d4"> = </tspan><tspan fill="#dcdcaa">insert_</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">-></tspan><tspan fill="#9cdcfe">right</tspan><tspan fill="#d4d4d4">, </tspan><tspan fill="#9cdcfe">value</tspan><tspan fill="#d4d4d4">);</tspan><tspan fill="#6a9955"> // greater &#x2192; go right</tspan>
  </text>

  <!-- ===== TREE VISUAL (below code) ===== -->
  <!-- Inserting 40: 40<50 left, 40>30 right, nullptr -> new leaf -->
  <!-- L0 y=230: 350 (50), L1 y=310: 230,470 (30,70), L2 y=390: 160,300,400,540 -->

  <rect x="680" y="198" width="150" height="26" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="755" y="216" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">Inserting: 40</text>

  <!-- Lines -->
  <line x1="350" y1="254" x2="230" y2="286" stroke="#e67e22" stroke-width="3"/>
  <line x1="350" y1="254" x2="470" y2="286" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="230" y1="334" x2="160" y2="366" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="230" y1="334" x2="300" y2="366" stroke="#e67e22" stroke-width="3"/>
  <line x1="470" y1="334" x2="400" y2="366" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="470" y1="334" x2="540" y2="366" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- L0: 50 -->
  <circle cx="350" cy="230" r="24" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="350" y="236" text-anchor="middle" font-size="15" font-weight="bold" fill="white">50</text>
  <text x="390" y="220" font-size="11" font-weight="bold" fill="#e67e22">&#x2460;</text>
  <text x="404" y="220" font-size="11" fill="#555">40 &lt; 50 &#x2192; go left</text>

  <!-- L1: 30, 70 -->
  <circle cx="230" cy="310" r="24" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="230" y="316" text-anchor="middle" font-size="15" font-weight="bold" fill="white">30</text>
  <text x="268" y="298" font-size="11" font-weight="bold" fill="#e67e22">&#x2461;</text>
  <text x="282" y="298" font-size="11" fill="#555">40 &gt; 30 &#x2192; go right</text>

  <circle cx="470" cy="310" r="24" fill="#bdc3c7" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="470" y="316" text-anchor="middle" font-size="15" font-weight="bold" fill="white">70</text>

  <!-- L2: 20, 40(NEW), 60, 80 -->
  <circle cx="160" cy="390" r="24" fill="#bdc3c7" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="160" y="396" text-anchor="middle" font-size="15" font-weight="bold" fill="white">20</text>

  <circle cx="300" cy="390" r="26" fill="#27ae60" stroke="#219a52" stroke-width="3"/>
  <text x="300" y="396" text-anchor="middle" font-size="15" font-weight="bold" fill="white">40</text>
  <text x="300" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">&#x2462; NEW LEAF</text>

  <circle cx="400" cy="390" r="24" fill="#bdc3c7" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="400" y="396" text-anchor="middle" font-size="15" font-weight="bold" fill="white">60</text>

  <circle cx="540" cy="390" r="24" fill="#bdc3c7" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="540" y="396" text-anchor="middle" font-size="15" font-weight="bold" fill="white">80</text>

  <!-- Key -->
  <circle cx="50" cy="210" r="10" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="68" y="214" font-size="11" fill="#555">Visited</text>
  <circle cx="50" cy="234" r="10" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="68" y="238" font-size="11" fill="#555">New node</text>
  <circle cx="50" cy="258" r="10" fill="#bdc3c7" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="68" y="262" font-size="11" fill="#555">Not visited</text>

  <!-- Footer -->
  <rect x="30" y="456" width="800" height="70" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="480" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">How it works</text>
  <text x="80" y="500" font-size="12" fill="#555">
    2 comparisons (one per level). On a balanced tree: <tspan font-weight="bold" fill="#e67e22">O(log n)</tspan>.
    New nodes are always leaves &#x2014; existing links are never rearranged.
  </text>
</svg>