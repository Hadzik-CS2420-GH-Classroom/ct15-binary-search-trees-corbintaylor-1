<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">destroy_() &#x2014; Recursion Trace</text>
  <text x="430" y="48" text-anchor="middle" font-size="13" fill="#888">Following every recursive call through a 3-node tree</text>

  <!-- ===== CODE BLOCK (left side) ===== -->
  <rect x="30" y="66" width="380" height="160" rx="8" fill="#1e1e1e"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="11">
    <tspan x="50" y="88" fill="#569cd6">void</tspan><tspan fill="#dcdcaa"> destroy_</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#4ec9b0">Node</tspan><tspan fill="#d4d4d4">*</tspan><tspan fill="#9cdcfe"> node</tspan><tspan fill="#d4d4d4">) {</tspan>
    <tspan x="70" y="110" fill="#c586c0">if</tspan><tspan fill="#d4d4d4"> (!</tspan><tspan fill="#9cdcfe">node</tspan><tspan fill="#d4d4d4">) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#d4d4d4">;</tspan><tspan fill="#6a9955">       // base case</tspan>
    <tspan x="70" y="140" fill="#dcdcaa">destroy_</tspan><tspan fill="#d4d4d4">(node-></tspan><tspan fill="#9cdcfe">left</tspan><tspan fill="#d4d4d4">);</tspan><tspan fill="#6a9955">  // 1. left first</tspan>
    <tspan x="70" y="162" fill="#dcdcaa">destroy_</tspan><tspan fill="#d4d4d4">(node-></tspan><tspan fill="#9cdcfe">right</tspan><tspan fill="#d4d4d4">);</tspan><tspan fill="#6a9955"> // 2. then right</tspan>
    <tspan x="70" y="184" fill="#c586c0">delete</tspan><tspan fill="#9cdcfe"> node</tspan><tspan fill="#d4d4d4">;</tspan><tspan fill="#6a9955">          // 3. NOW safe to delete</tspan>
    <tspan x="50" y="206" fill="#d4d4d4">}</tspan>
  </text>

  <!-- ===== TREE (right side, top) ===== -->
  <text x="570" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#888">Tree:</text>

  <line x1="570" y1="120" x2="510" y2="158" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="570" y1="120" x2="630" y2="158" stroke="#bdc3c7" stroke-width="2"/>
  <circle cx="570" cy="104" r="20" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="570" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="white">50</text>
  <circle cx="510" cy="174" r="20" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="510" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="white">30</text>
  <circle cx="630" cy="174" r="20" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="630" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="white">70</text>

  <!-- nullptr labels -->
  <text x="480" y="208" text-anchor="middle" font-size="9" fill="#bdc3c7" font-style="italic">null</text>
  <text x="540" y="208" text-anchor="middle" font-size="9" fill="#bdc3c7" font-style="italic">null</text>
  <text x="600" y="208" text-anchor="middle" font-size="9" fill="#bdc3c7" font-style="italic">null</text>
  <text x="660" y="208" text-anchor="middle" font-size="9" fill="#bdc3c7" font-style="italic">null</text>

  <!-- ===== TRACE (full width, below) ===== -->
  <text x="430" y="248" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">Call Stack Trace</text>

  <!-- Step 1: destroy_(50) -->
  <rect x="30" y="262" width="800" height="28" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
  <text x="44" y="281" font-size="11" font-weight="bold" fill="#3498db">&#x2460;</text>
  <text x="62" y="281" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">destroy_(50)</text>
  <text x="400" y="281" font-size="11" fill="#888">call left first &#x2192; destroy_(30)</text>

  <!-- Step 2: destroy_(30) indented -->
  <rect x="50" y="294" width="780" height="28" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
  <text x="64" y="313" font-size="11" font-weight="bold" fill="#3498db">&#x2461;</text>
  <text x="86" y="313" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">destroy_(30)</text>
  <text x="400" y="313" font-size="11" fill="#888">call left first &#x2192; destroy_(nullptr)</text>

  <!-- Step 3: nullptr -->
  <rect x="70" y="326" width="760" height="24" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="84" y="343" font-size="11" font-weight="bold" fill="#e67e22">&#x2462;</text>
  <text x="106" y="343" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#888">destroy_(nullptr) &#x2192; return</text>
  <text x="400" y="343" font-size="11" fill="#e67e22">base case! 30&#x2192;left is null</text>

  <!-- Step 4: nullptr -->
  <rect x="70" y="354" width="760" height="24" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="84" y="371" font-size="11" font-weight="bold" fill="#e67e22">&#x2463;</text>
  <text x="106" y="371" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#888">destroy_(nullptr) &#x2192; return</text>
  <text x="400" y="371" font-size="11" fill="#e67e22">base case! 30&#x2192;right is null</text>

  <!-- Step 5: DELETE 30 -->
  <rect x="50" y="382" width="780" height="28" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="64" y="401" font-size="11" font-weight="bold" fill="#27ae60">&#x2464;</text>
  <text x="86" y="401" font-size="11" font-family="Consolas, 'Courier New', monospace" font-weight="bold" fill="#27ae60">delete 30 &#x2713;</text>
  <text x="400" y="401" font-size="11" fill="#27ae60">both children done &#x2192; safe to free</text>

  <!-- Step 6: destroy_(70) -->
  <rect x="50" y="414" width="780" height="28" rx="4" fill="#eaf2f8" stroke="#3498db" stroke-width="1"/>
  <text x="64" y="433" font-size="11" font-weight="bold" fill="#3498db">&#x2465;</text>
  <text x="86" y="433" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#555">destroy_(70)</text>
  <text x="400" y="433" font-size="11" fill="#888">back to 50, now call right &#x2192; destroy_(70)</text>

  <!-- Step 7: nullptr -->
  <rect x="70" y="446" width="760" height="24" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="84" y="463" font-size="11" font-weight="bold" fill="#e67e22">&#x2466;</text>
  <text x="106" y="463" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#888">destroy_(nullptr) &#x2192; return</text>
  <text x="400" y="463" font-size="11" fill="#e67e22">base case! 70&#x2192;left is null</text>

  <!-- Step 8: nullptr -->
  <rect x="70" y="474" width="760" height="24" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="84" y="491" font-size="11" font-weight="bold" fill="#e67e22">&#x2467;</text>
  <text x="106" y="491" font-size="11" font-family="Consolas, 'Courier New', monospace" fill="#888">destroy_(nullptr) &#x2192; return</text>
  <text x="400" y="491" font-size="11" fill="#e67e22">base case! 70&#x2192;right is null</text>

  <!-- Step 9: DELETE 70 -->
  <rect x="50" y="502" width="780" height="28" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="64" y="521" font-size="11" font-weight="bold" fill="#27ae60">&#x2468;</text>
  <text x="86" y="521" font-size="11" font-family="Consolas, 'Courier New', monospace" font-weight="bold" fill="#27ae60">delete 70 &#x2713;</text>
  <text x="400" y="521" font-size="11" fill="#27ae60">both children done &#x2192; safe to free</text>

  <!-- Step 10: DELETE 50 -->
  <rect x="30" y="534" width="800" height="28" rx="4" fill="#fdedec" stroke="#e74c3c" stroke-width="2"/>
  <text x="44" y="553" font-size="11" font-weight="bold" fill="#e74c3c">&#x2469;</text>
  <text x="62" y="553" font-size="11" font-family="Consolas, 'Courier New', monospace" font-weight="bold" fill="#e74c3c">delete 50 &#x2713;</text>
  <text x="400" y="553" font-size="11" fill="#e74c3c">root freed last &#x2014; tree is completely gone</text>
</svg>